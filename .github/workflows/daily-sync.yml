name: Daily Synchronization

on:
  schedule:
    - cron: '0 2 * * *' # Runs every day at 02:00 UTC (04:00 CET/CEST)
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Cardmarket Product Update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENABLE_SCRAPER_CACHE: "true"
        run: npm run sync:products

      - name: Run Cardmarket Pricing Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENABLE_SCRAPER_CACHE: "true"
        run: npm run sync:cardmarket:prices
